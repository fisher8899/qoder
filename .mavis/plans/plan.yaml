version: 1
plan:
  name: "月度业绩考核系统 - 代码全面审查"
  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 10
tasks:
  - id: backend-review
    title: "后端代码深度审查 (Spring Boot)"
    role: verify-as-task
    prompt: |
      你是一位有15年经验的Java/Spring Boot资深架构师，精通代码质量、安全、性能和最佳实践。
      你的任务是对 D:\qoder\assessment-backend 目录下的代码进行全面、深入、犀利的代码审查。

      ## 审查范围
      请审查所有Java源文件，重点关注：
      1. Controller层 - 业务控制器
      2. Service层 - 业务逻辑
      3. Security相关 - 认证、授权、JWT
      4. Entity层 - 数据模型
      5. 工具类 - 通用工具
      6. 配置文件 - application.yml等

      ## 审查维度（必须涵盖）
      ### 1. 代码质量
      - 命名规范、代码风格一致性
      - 方法长度、类长度控制
      - 重复代码
      - 注释质量

      ### 2. 安全性 🔴 必须严格审查
      - SQL注入风险
      - XSS防护
      - 认证授权漏洞
      - 敏感信息暴露
      - JWT实现安全性
      - 密码加密强度

      ### 3. 架构设计
      - 分层是否合理
      - 耦合度分析
      - 设计模式使用
      - 异常处理是否规范

      ### 4. 性能问题
      - N+1查询问题
      - 大数据量处理
      - 缓存使用情况
      - 数据库索引合理性

      ### 5. 业务逻辑漏洞
      - 并发问题
      - 边界条件处理
      - 数据一致性

      ### 6. 日志和监控
      - 日志记录完整性
      - 关键操作审计

      ## 输出要求
      生成一份专业、犀利、毫不留情的代码审查报告，包括：

      1. **总体评分**（0-100分，附评分维度说明）
      2. **致命问题**（必须立即修复的安全/架构问题）- 🔴标识
      3. **严重问题**（影响系统稳定性的问题）- 🟠标识
      4. **一般问题**（代码质量和规范问题）- 🟡标识
      5. **优化建议**（性能、可维护性改进）
      6. **详细问题清单**（每个问题要包含：文件路径:行号、问题描述、风险等级、修复建议）

      语言：全程使用中文输出。言辞要犀利，直接指出问题所在，不要客气。
      报告保存到 D:\qoder\CODE_REVIEW_BACKEND_2026-06-01.md
    assigned_to: general
    timeout_ms: 1800000

  - id: frontend-review
    title: "前端代码深度审查 (Vue 3/TypeScript)"
    role: verify-as-task
    prompt: |
      你是一位有12年经验的Vue 3/TypeScript前端架构师，精通现代前端工程化、安全最佳实践和性能优化。
      你的任务是对 D:\qoder\assessment-frontend 目录下的代码进行全面、深入、犀利的代码审查。

      ## 审查范围
      请审查所有源文件，重点关注：
      1. Vue组件 - .vue文件
      2. TypeScript代码 - .ts文件
      3. API调用层 - api/*.ts
      4. 路由配置 - router/*
      5. 状态管理 - stores/*
      6. 配置文件 - vite.config.ts等

      ## 审查维度（必须涵盖）
      ### 1. 代码质量
      - 命名规范
      - TypeScript类型安全（any滥用、类型断言）
      - 代码重复
      - 组件复杂度
      - 注释和文档

      ### 2. 安全性 🔴 必须严格审查
      - XSS风险（v-html、用户输入）
      - API请求安全
      - 敏感数据处理
      - 身份验证状态管理
      - 越权访问前端防护

      ### 3. 架构设计
      - 组件拆分合理性
      - 状态管理规范性
      - 代码耦合度
      - 复用性

      ### 4. 性能
      - 重渲染问题
      - 大列表虚拟滚动
      - 懒加载使用
      - 包体积
      - API请求合并

      ### 5. 用户体验
      - 错误处理
      - 加载状态
      - 空状态处理
      - 表单验证

      ### 6. Vue 3最佳实践
      - Composition API使用
      - 响应式陷阱
      - 副作用管理

      ## 输出要求
      生成一份专业、犀利、毫不留情的代码审查报告，包括：

      1. **总体评分**（0-100分，附评分维度说明）
      2. **致命问题**（必须立即修复的安全/架构问题）- 🔴标识
      3. **严重问题**（影响系统稳定性的问题）- 🟠标识
      4. **一般问题**（代码质量和规范问题）- 🟡标识
      5. **优化建议**（性能、可维护性改进）
      6. **详细问题清单**（每个问题要包含：文件路径:行号、问题描述、风险等级、修复建议）

      语言：全程使用中文输出。言辞要犀利，直接指出问题所在，不要客气。
      报告保存到 D:\qoder\CODE_REVIEW_FRONTEND_2026-06-01.md
    assigned_to: general
    timeout_ms: 1800000
