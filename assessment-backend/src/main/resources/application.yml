server:
  port: ${SERVER_PORT:8080}

spring:
  profiles:
    default: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  upload:
    path: ${APP_UPLOAD_PATH:./uploads}
  jwt:
    expiration: ${JWT_EXPIRATION:14400000}
  docs:
    enabled: false
  login:
    rate-limit:
      max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_WINDOW_SECONDS:60}
  workflow:
    base-url: ${WORKFLOW_BASE_URL:https://localhost:5555}
    api-key: ${WORKFLOW_API_KEY:}
    role-user-ids:
      DEPT_LEADER: "00000000-0000-0000-0000-000000000002"
      SUPERVISOR: "00000000-0000-0000-0000-000000000003"
      FIN_ADMIN: "00000000-0000-0000-0000-000000000011"
      DEPT_ADMIN: "00000000-0000-0000-0000-000000000001"
