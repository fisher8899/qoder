spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/assessment_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

app:
  workflow:
    # 工作流平台地址
    base-url: ${WORKFLOW_BASE_URL:http://localhost:5555}
    # 业绩指标审核工作流 ID（由工作流平台生成，首次启动后从数据库读取）
    indicator-workflow-id: ${WORKFLOW_INDICATOR_ID:}
  jwt:
    # 本地开发提供默认值，生产环境仍应显式覆盖。
    secret: ${JWT_SECRET:assessment-dev-secret-key-2026-1234567890}
  docs:
    enabled: true
  db-admin:
    enabled: ${APP_DB_ADMIN_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
