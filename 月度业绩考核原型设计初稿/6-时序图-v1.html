<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月度业绩考核管理 - 时序图 v1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f7fa; color: #333; }
.header { background: linear-gradient(135deg, #1a3a6b, #2d5aa0); color: #fff; padding: 24px 40px; }
.header h1 { font-size: 22px; }
.header p { font-size: 13px; opacity: 0.7; margin-top: 6px; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.section { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 28px; overflow: hidden; }
.section-title { padding: 18px 24px; border-bottom: 2px solid #2d5aa0; }
.section-title h2 { font-size: 17px; color: #1a3a6b; }
.section-title p { font-size: 12px; color: #999; margin-top: 4px; }
.diagram-area { padding: 20px; overflow-x: auto; }

/* Sequence diagram structure */
.seq-diagram { display: flex; flex-direction: column; min-width: 1100px; position: relative; }
.seq-participants { display: flex; justify-content: center; margin-bottom: 0; position: relative; z-index: 2; }
.seq-participant { width: 140px; text-align: center; margin: 0 20px; }
.seq-participant-box { background: #2d5aa0; color: #fff; padding: 10px 8px; border-radius: 6px; font-size: 13px; font-weight: 600; line-height: 1.4; white-space: nowrap; }
.seq-participant-sub { font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }
.seq-lifelines { display: flex; justify-content: center; position: relative; }
.seq-lifeline { width: 140px; margin: 0 20px; position: relative; }
.lifeline-line { width: 2px; background: #c5d3e8; position: absolute; left: 50%; top: 0; bottom: 0; transform: translateX(-50%); }
.lifeline-line-dashed { width: 2px; border-left: 2px dashed #c5d3e8; position: absolute; left: 50%; top: 0; bottom: 0; transform: translateX(-50%); }

/* Messages */
.seq-messages { position: relative; padding: 8px 0; }
.seq-msg { display: flex; align-items: center; margin: 10px 0; position: relative; height: 28px; }
.msg-arrow { height: 2px; position: absolute; top: 13px; }
.msg-arrow-right { background: #2d5aa0; }
.msg-arrow-left { background: #d46b08; }
.msg-arrow-self { background: #722ed1; }
.msg-label { position: absolute; top: -2px; font-size: 12px; white-space: nowrap; }
.msg-label-right { color: #2d5aa0; }
.msg-label-left { color: #d46b08; }
.msg-label-self { color: #722ed1; }
.msg-dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 10px; }
.msg-dot-right { background: #2d5aa0; right: -4px; }
.msg-dot-left { background: #d46b08; left: -4px; }

/* Step number */
.step-num { width: 22px; height: 22px; background: #2d5aa0; color: #fff; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-right: 6px; }
.step-num-alt { background: #d46b08; }
.step-num-note { background: #722ed1; }

/* Alt fragment */
.alt-fragment { border: 1px solid #bfbfbf; border-radius: 4px; margin: 8px 0; position: relative; background: rgba(255,255,255,0.5); }
.alt-label { position: absolute; top: -1px; left: -1px; background: #666; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px 0 4px 0; font-weight: 600; }
.alt-label-pass { background: #52c41a; }
.alt-label-reject { background: #cf1322; }
.alt-divider { border-top: 1px dashed #bfbfbf; margin: 0; position: relative; }
.alt-divider-label { position: absolute; top: -10px; left: 8px; background: #fff; padding: 0 4px; font-size: 10px; color: #999; }

/* Detailed row-based layout for better control */
.seq-row { display: flex; align-items: center; min-height: 36px; margin: 4px 0; position: relative; }
.seq-row-note { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px; padding: 6px 12px; margin: 8px 0; font-size: 12px; color: #ad6800; line-height: 1.6; }
.seq-row-note strong { color: #8c6900; }

/* Timeline column layout */
.timeline { display: flex; flex-direction: column; align-items: stretch; position: relative; }
.t-row { display: grid; grid-template-columns: 40px 140px 1fr 140px 1fr 140px 1fr 140px 1fr 140px; align-items: center; min-height: 32px; margin: 2px 0; }
.t-row-alt { display: grid; grid-template-columns: 40px 140px 1fr 280px 1fr 140px; align-items: center; min-height: 32px; margin: 2px 0; }

/* New approach: SVG-based */
.diagram-svg { width: 100%; min-height: 400px; }

/* Tab navigation */
.tabs { display: flex; gap: 0; margin-bottom: 0; }
.tab-btn { padding: 10px 24px; font-size: 14px; font-weight: 600; color: #999; background: #f0f2f5; border: 1px solid #e8e8e8; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; }
.tab-btn.active { color: #2d5aa0; background: #fff; border-color: #2d5aa0; border-bottom-color: #fff; margin-bottom: -1px; z-index: 1; }
.tab-btn:hover:not(.active) { color: #555; background: #e8e8e8; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Legend */
.legend { display: flex; gap: 20px; flex-wrap: wrap; margin: 16px 24px; padding: 12px 16px; background: #fafafa; border-radius: 4px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
.legend-line { width: 30px; height: 2px; }
.legend-line-solid { background: #2d5aa0; }
.legend-line-reject { background: #d46b08; }
.legend-line-self { background: #722ed1; }
.legend-line-dashed { border-top: 2px dashed #52c41a; height: 0; }

.version-tag { font-size: 11px; color: #999; background: #f0f0f0; padding: 2px 8px; border-radius: 3px; }
</style>
</head>
<body>
<div class="header">
  <h1>月度业绩考核管理 - 时序图 <span class="version-tag">v1</span></h1>
  <p>中煤鄂尔多斯能源化工有限公司 · 综合考评管理系统</p>
</div>
<div class="container">
  <div class="section">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('seq1')">业绩指标设定时序图</button>
      <button class="tab-btn" onclick="switchTab('seq2')">月度业绩考核时序图</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-line legend-line-solid"></div> 正向操作/消息</div>
      <div class="legend-item"><div class="legend-line legend-line-reject"></div> 退回操作</div>
      <div class="legend-item"><div class="legend-line legend-line-self"></div> 自操作/内部</div>
      <div class="legend-item"><div class="legend-line legend-line-dashed"></div> 响应/返回</div>
    </div>

    <!-- ============ 时序图1：业绩指标设定 ============ -->
    <div id="seq1" class="tab-content active">
      <div class="section-title" style="border-bottom-color:#2d5aa0;">
        <h2>业绩指标设定时序图</h2>
        <p>年初启动年度考核目标设定，由各部门录入指标，逐级审批确认</p>
      </div>
      <div class="diagram-area">
        <svg viewBox="0 0 1200 1080" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:1100px;">
          <!-- Fonts -->
          <defs>
            <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2d5aa0"/></marker>
            <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#d46b08"/></marker>
            <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#722ed1"/></marker>
            <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6" fill="#52c41a"/></marker>
          </defs>

          <!-- Participant boxes -->
          <rect x="40" y="10" width="130" height="42" rx="6" fill="#2d5aa0"/>
          <text x="105" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">计划财务部(改革办公室)业绩考核管理员</text>
          <text x="105" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">(计划财务处)</text>

          <rect x="250" y="10" width="130" height="42" rx="6" fill="#fa8c16"/>
          <text x="315" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">部门绩效管理员</text>
          <text x="315" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">(部门联络员)</text>

          <rect x="460" y="10" width="130" height="42" rx="6" fill="#52c41a"/>
          <text x="525" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">部门负责人</text>
          <text x="525" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">(部门领导)</text>

          <rect x="670" y="10" width="130" height="42" rx="6" fill="#722ed1"/>
          <text x="735" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">分管领导</text>
          <text x="735" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">(上级主管)</text>

          <rect x="880" y="10" width="130" height="42" rx="6" fill="#8c8c8c"/>
          <text x="945" y="28" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">系统</text>
          <text x="945" y="42" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">(自动处理)</text>

          <!-- Lifelines -->
          <line x1="105" y1="52" x2="105" y2="1060" stroke="#c5d3e8" stroke-width="2"/>
          <line x1="315" y1="52" x2="315" y2="1060" stroke="#c5d3e8" stroke-width="2"/>
          <line x1="525" y1="52" x2="525" y2="1060" stroke="#c5d3e8" stroke-width="2"/>
          <line x1="735" y1="52" x2="735" y2="1060" stroke="#c5d3e8" stroke-width="2"/>
          <line x1="945" y1="52" x2="945" y2="1060" stroke="#c5d3e8" stroke-width="2"/>

          <!-- Step 1: 创建考核组 -->
          <circle cx="18" cy="85" r="12" fill="#2d5aa0"/><text x="18" y="89" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
          <line x1="105" y1="85" x2="940" y2="85" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>
          <text x="522" y="80" text-anchor="middle" fill="#2d5aa0" font-size="12" font-weight="600">创建年度业绩指标设定考核组（添加成员名单、业绩指标模版、设定开始日期）</text>

          <!-- Step 2: 启动 -->
          <circle cx="18" cy="125" r="12" fill="#2d5aa0"/><text x="18" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
          <line x1="105" y1="125" x2="940" y2="125" stroke="#722ed1" stroke-width="2" marker-end="url(#arrowPurple)"/>
          <text x="522" y="120" text-anchor="middle" fill="#722ed1" font-size="12" font-weight="600">点击「启动」— 开启年度指标设定工作</text>

          <!-- Step 3: 录入指标 -->
          <circle cx="18" cy="170" r="12" fill="#fa8c16"/><text x="18" y="174" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
          <line x1="315" y1="165" x2="940" y2="165" stroke="#722ed1" stroke-width="2" marker-end="url(#arrowPurple)"/>
          <text x="628" y="160" text-anchor="middle" fill="#722ed1" font-size="12">线下沟通后，在系统中录入本部门年度考核指标（大类→小类→考核内容）</text>
          <line x1="315" y1="180" x2="940" y2="180" stroke="#722ed1" stroke-width="2" marker-end="url(#arrowPurple)"/>
          <text x="628" y="175" text-anchor="middle" fill="#722ed1" font-size="12">保存为「草稿」状态</text>

          <!-- Step 4: 提交审批 -->
          <circle cx="18" cy="215" r="12" fill="#fa8c16"/><text x="18" y="219" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
          <line x1="315" y1="215" x2="520" y2="215" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>
          <text x="418" y="210" text-anchor="middle" fill="#2d5aa0" font-size="12" font-weight="600">提交年度业绩指标</text>
          <text x="418" y="228" text-anchor="middle" fill="#999" font-size="10">状态 → 待部门负责人审批</text>

          <!-- Step 5: 部门负责人审批 -->
          <circle cx="18" cy="270" r="12" fill="#52c41a"/><text x="18" y="274" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
          <text x="525" y="258" text-anchor="middle" fill="#333" font-size="13" font-weight="600">【部门负责人审批】</text>

          <!-- Alt: 通过 -->
          <rect x="60" y="275" width="870" height="110" rx="4" fill="none" stroke="#52c41a" stroke-width="1.5"/>
          <rect x="60" y="275" width="50" height="18" rx="4 0 4 0" fill="#52c41a"/>
          <text x="85" y="288" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">通过</text>

          <line x1="525" y1="305" x2="730" y2="305" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>
          <text x="628" y="300" text-anchor="middle" fill="#2d5aa0" font-size="12" font-weight="600">审批通过，提交给分管领导</text>
          <text x="628" y="318" text-anchor="middle" fill="#999" font-size="10">状态 → 待分管领导审批</text>

          <!-- Alt: 退回 -->
          <line x1="60" y1="338" x2="930" y2="338" stroke="#bfbfbf" stroke-width="1" stroke-dasharray="6,4"/>
          <text x="940" y="334" text-anchor="end" fill="#999" font-size="10">else</text>
          <rect x="64" y="340" width="38" height="18" rx="3" fill="#cf1322"/>
          <text x="83" y="353" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">退回</text>

          <line x1="525" y1="365" x2="320" y2="365" stroke="#d46b08" stroke-width="2" marker-end="url(#arrowOrange)"/>
          <text x="422" y="360" text-anchor="middle" fill="#d46b08" font-size="12" font-weight="600">退回到部门绩效管理员（补充退回说明）</text>
          <text x="422" y="378" text-anchor="middle" fill="#cf1322" font-size="10">状态 → 被退回，需更正后重新提交</text>

          <!-- Step 6: 分管领导审批 -->
          <circle cx="18" cy="410" r="12" fill="#722ed1"/><text x="18" y="414" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
          <text x="735" y="398" text-anchor="middle" fill="#333" font-size="13" font-weight="600">【分管领导审批】</text>

          <rect x="60" y="415" width="870" height="110" rx="4" fill="none" stroke="#52c41a" stroke-width="1.5"/>
          <rect x="60" y="415" width="50" height="18" rx="4 0 4 0" fill="#52c41a"/>
          <text x="85" y="428" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">通过</text>

          <line x1="735" y1="445" x2="110" y2="445" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>
          <text x="422" y="440" text-anchor="middle" fill="#2d5aa0" font-size="12" font-weight="600">审批通过，提交给计划财务部(改革办公室)业绩考核管理员</text>
          <text x="422" y="458" text-anchor="middle" fill="#999" font-size="10">状态 → 待财务处审批</text>

          <line x1="60" y1="478" x2="930" y2="478" stroke="#bfbfbf" stroke-width="1" stroke-dasharray="6,4"/>
          <text x="940" y="474" text-anchor="end" fill="#999" font-size="10">else</text>
          <rect x="64" y="480" width="38" height="18" rx="3" fill="#cf1322"/>
          <text x="83" y="493" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">退回</text>

          <line x1="735" y1="505" x2="320" y2="505" stroke="#d46b08" stroke-width="2" marker-end="url(#arrowOrange)"/>
          <text x="528" y="500" text-anchor="middle" fill="#d46b08" font-size="12" font-weight="600">退回到部门绩效管理员（补充退回说明）</text>

          <!-- Step 7: 计划财务部(改革办公室)业绩考核管理员审批 -->
          <circle cx="18" cy="550" r="12" fill="#2d5aa0"/><text x="18" y="554" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">7</text>
          <text x="105" y="538" text-anchor="middle" fill="#333" font-size="13" font-weight="600">【计划财务部(改革办公室)业绩考核管理员审批】</text>

          <rect x="60" y="555" width="870" height="110" rx="4" fill="none" stroke="#52c41a" stroke-width="1.5"/>
          <rect x="60" y="555" width="50" height="18" rx="4 0 4 0" fill="#52c41a"/>
          <text x="85" y="568" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">通过</text>

          <line x1="105" y1="585" x2="940" y2="585" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>
          <text x="522" y="580" text-anchor="middle" fill="#2d5aa0" font-size="12" font-weight="600">审批通过 — 确定本年度业绩考核指标</text>
          <text x="522" y="598" text-anchor="middle" fill="#52c41a" font-size="10" font-weight="600">状态 → 审批通过 ✅</text>

          <line x1="60" y1="618" x2="930" y2="618" stroke="#bfbfbf" stroke-width="1" stroke-dasharray="6,4"/>
          <text x="940" y="614" text-anchor="end" fill="#999" font-size="10">else</text>
          <rect x="64" y="620" width="38" height="18" rx="3" fill="#cf1322"/>
          <text x="83" y="633" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">退回</text>

          <line x1="105" y1="645" x2="320" y2="645" stroke="#d46b08" stroke-width="2" marker-end="url(#arrowOrange)"/>
          <text x="212" y="640" text-anchor="middle" fill="#d46b08" font-size="12" font-weight="600">退回（补充修改点说明）</text>
          <text x="212" y="658" text-anchor="middle" fill="#cf1322" font-size="10">状态 → 被退回，返回步骤3更正</text>

          <!-- Note: 中途调整 -->
          <rect x="100" y="700" width="960" height="70" rx="6" fill="#fffbe6" stroke="#ffe58f" stroke-width="1.5"/>
          <circle cx="120" cy="720" r="10" fill="#fa8c16"/>
          <text x="120" y="724" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">!</text>
          <text x="140" y="724" fill="#8c6900" font-size="12" font-weight="600">指标更新规则</text>
          <text x="140" y="742" fill="#ad6800" font-size="11">年度考核目标原则上中途不调整。如确需调整：部门绩效管理员线下联系计划财务部(改革办公室)业绩考核管理员 → 系统执行退回 →</text>
          <text x="140" y="758" fill="#ad6800" font-size="11">部门绩效管理员修改后重新发起审批（部门负责人 → 分管领导 → 计划财务部(改革办公室)业绩考核管理员），与首次设定流程相同。</text>

          <!-- 状态流转示意 -->
          <text x="560" y="810" text-anchor="middle" fill="#1a3a6b" font-size="14" font-weight="600">指标设定状态流转</text>

          <rect x="100" y="825" width="70" height="28" rx="14" fill="#e6f4ff" stroke="#91caff" stroke-width="1.5"/>
          <text x="135" y="844" text-anchor="middle" fill="#0958d9" font-size="11" font-weight="600">草稿</text>

          <line x1="170" y1="839" x2="220" y2="839" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>

          <rect x="222" y="825" width="148" height="28" rx="4" fill="#fff7e6" stroke="#ffd591" stroke-width="1.5"/>
          <text x="296" y="844" text-anchor="middle" fill="#d46b08" font-size="11" font-weight="600">待部门负责人审批</text>

          <line x1="370" y1="839" x2="420" y2="839" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>

          <rect x="422" y="825" width="118" height="28" rx="4" fill="#f9f0ff" stroke="#d3adf7" stroke-width="1.5"/>
          <text x="481" y="844" text-anchor="middle" fill="#722ed1" font-size="11" font-weight="600">待分管领导审批</text>

          <line x1="540" y1="839" x2="590" y2="839" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>

          <rect x="592" y="825" width="100" height="28" rx="4" fill="#f6ffed" stroke="#b7eb8f" stroke-width="1.5"/>
          <text x="642" y="844" text-anchor="middle" fill="#389e0d" font-size="11" font-weight="600">待财务处审批</text>

          <line x1="692" y1="839" x2="742" y2="839" stroke="#2d5aa0" stroke-width="2" marker-end="url(#arrowBlue)"/>

<script>
function switchTab(tabId) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');

}
