<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目文档查看器</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --panel: rgba(255, 252, 247, 0.95);
      --panel-strong: #fffdfa;
      --ink: #1f2a30;
      --muted: #68767d;
      --line: rgba(39, 62, 70, 0.12);
      --brand: #0f6467;
      --brand-soft: #dcefed;
      --accent-soft: #f9e7d9;
      --warn: #8a6402;
      --ok: #24724f;
      --ok-soft: #ddf0e7;
      --shadow: 0 24px 50px rgba(29, 42, 48, 0.08);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at left top, rgba(15, 100, 103, 0.12), transparent 24%),
        radial-gradient(circle at right top, rgba(191, 107, 46, 0.1), transparent 20%),
        linear-gradient(180deg, #f7f2e8 0%, #f0ece3 100%);
    }
    .page { max-width: 1320px; margin: 0 auto; padding: 28px; }
    .hero, .layout, .summary-grid { display: grid; gap: 22px; }
    .hero { grid-template-columns: 1.2fr 0.8fr; margin-bottom: 22px; }
    .layout { grid-template-columns: 300px 1fr; align-items: start; }
    .summary-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero-card, .card { padding: 24px; }
    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--brand-soft);
      color: var(--brand);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 { margin: 14px 0 10px; font-size: 34px; line-height: 1.1; }
    h2 { margin: 0 0 14px; font-size: 24px; }
    h3 { margin: 0 0 12px; font-size: 18px; }
    p, li { color: var(--muted); line-height: 1.8; }
    .meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .pill {
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #eef2f4;
      color: #4d5b61;
    }
    .pill.brand { background: var(--brand-soft); color: var(--brand); }
    .pill.warn { background: #f8efcd; color: var(--warn); }
    .pill.ok { background: var(--ok-soft); color: var(--ok); }
    .sidebar { padding: 18px; position: sticky; top: 18px; }
    .doc-link {
      display: block;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--ink);
      text-decoration: none;
      margin-bottom: 10px;
      transition: 0.18s ease;
    }
    .doc-link:hover, .doc-link.active {
      transform: translateY(-1px);
      border-color: rgba(15, 100, 103, 0.3);
      box-shadow: 0 10px 22px rgba(29, 42, 48, 0.08);
    }
    .doc-link strong { display: block; margin-bottom: 4px; font-size: 15px; }
    .doc-link span { display: block; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .summary-card {
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
    }
    .summary-card strong { display: block; margin-top: 8px; font-size: 22px; color: var(--ink); }
    .section-block {
      padding: 20px 22px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      margin-bottom: 16px;
    }
    .section-block ul, .section-block ol { margin: 10px 0 0; padding-left: 20px; }
    .section-block table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .section-block th, .section-block td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      color: var(--muted);
    }
    .section-block th { color: var(--ink); }
    .callout {
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff3e7, #fff8f1);
      border: 1px solid rgba(191, 107, 46, 0.18);
      color: #734526;
    }
    .callout p { color: #734526; margin: 0; }
    .doc-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    .action-link {
      display: inline-block;
      padding: 12px 14px;
      border-radius: 14px;
      text-decoration: none;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      color: var(--ink);
      font-weight: 600;
    }
    .action-link:hover { border-color: rgba(15, 100, 103, 0.3); }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      color: var(--ink);
      margin: 0 0 12px;
      line-height: 1.35;
    }
    .markdown-body h1 { font-size: 28px; }
    .markdown-body h2 { font-size: 22px; margin-top: 10px; }
    .markdown-body h3 { font-size: 18px; margin-top: 10px; }
    .markdown-body p { margin: 10px 0; }
    .markdown-body code {
      padding: 2px 6px;
      border-radius: 8px;
      background: #f1f4f5;
      color: #28505f;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }
    .markdown-body pre {
      margin: 12px 0;
      padding: 16px;
      border-radius: 16px;
      background: #19272c;
      color: #ecf5f6;
      overflow: auto;
    }
    .markdown-body pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
    }
    .markdown-body blockquote {
      margin: 12px 0;
      padding: 12px 16px;
      border-left: 4px solid rgba(15, 100, 103, 0.35);
      background: #f4fbfb;
      border-radius: 0 14px 14px 0;
    }
    .status-line {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    @media (max-width: 1160px) {
      .hero, .layout, .summary-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <section class="panel hero-card">
        <span class="eyebrow">Document Viewer V2</span>
        <h1 id="docTitle">项目文档查看器</h1>
        <p id="docIntro">优先自动读取本地 Markdown，并以更适合项目负责人阅读的视觉化方式呈现。</p>
        <div class="meta" id="docMeta"></div>
      </section>
      <section class="panel hero-card">
        <h2>查看说明</h2>
        <p>当前版本优先读取真实 Markdown 原文并渲染。如果浏览器因为本地文件安全策略无法直接读取，本页会自动降级为结构化摘要展示，同时保留“打开原文”。</p>
        <div class="status-line">
          <span class="pill brand">优先自动读取</span>
          <span class="pill warn">失败自动降级</span>
          <span class="pill ok">中文名称展示</span>
        </div>
        <div class="doc-actions">
          <a class="action-link" href="./project-management-dashboard.html">返回项目看板</a>
          <a class="action-link" id="rawDocLink" href="#" target="_blank">打开原文</a>
        </div>
      </section>
    </div>

    <div class="layout">
      <aside class="panel sidebar" id="docNav"></aside>
      <main>
        <div class="summary-grid" id="summaryGrid"></div>
        <div style="height:22px;"></div>
        <section class="panel card" id="docContent"></section>
      </main>
    </div>
  </div>

  <script>
    const docs = {
      handoff: { name: "启动交接说明", file: "SESSION_HANDOFF.md", intro: "用于机器重启或重新进入项目后，最快完成接手和恢复上下文。", meta: ["重启入口", "状态总览", "命令说明"], summary: [{ label: "当前阶段", value: "业务需求开发中" }, { label: "当前主任务", value: "继续完成业务需求实现" }, { label: "重点提醒", value: "任务完成后必须同步更新文档" }], sections: [{ title: "摘要", html: "<p>告诉你先看哪些文件、当前做到哪、接下来该干什么，以及当前有什么运行和协作风险。</p>" }] },
      dashboard: { name: "项目总览看板文档", file: "PROJECT_PROGRESS.md", intro: "站在项目总控视角，概览模块进度、当前状态、下一任务和风险。", meta: ["总览文档", "项目状态", "风险入口"], summary: [{ label: "核心业务进度", value: "85%" }, { label: "上线准备度", value: "35%" }, { label: "当前入口", value: "项目管理看板" }], sections: [{ title: "摘要", html: "<p>当前项目更准确的状态是：功能开发后期，联调收口前，尚未进入真正可交付测试阶段。</p>" }] },
      progress: { name: "项目进度记录", file: "progress.md", intro: "任务级别的运行记录，重点记录刚做完什么和下一步做什么。", meta: ["任务日志", "最近完成", "下一步"], summary: [{ label: "总体进度", value: "约 85%" }, { label: "当前重点", value: "集成测试准备" }, { label: "最新成果", value: "文档查看器 V2" }], sections: [{ title: "摘要", html: "<p>用于追踪最近完成项、当前任务产出以及下一步计划。</p>" }] },
      bug: { name: "缺陷修复台账", file: "BUG_FIX_LOG.md", intro: "记录修复了哪些缺陷、根因是什么、方案是什么、如何验证。", meta: ["缺陷追溯", "修复方案", "验证记录"], summary: [{ label: "已记录问题", value: "5+" }, { label: "最高优先级", value: "P0" }, { label: "主要来源", value: "联调与构建" }], sections: [{ title: "摘要", html: "<p>用于回看问题、根因、修复方案和验证方式。</p>" }] },
      requirement: { name: "需求变更台账", file: "REQUIREMENT_CHANGE_LOG.md", intro: "记录新增了哪些需求、调整了哪些需求、为什么改、怎么实现。", meta: ["需求追溯", "变更记录", "实现方案"], summary: [{ label: "近期重点", value: "项目治理能力增强" }, { label: "新增方向", value: "项目负责人看板" }, { label: "最新变更", value: "Markdown 自动读取" }], sections: [{ title: "摘要", html: "<p>用于回答为什么项目今天变成了这样，以及每次管理增强是怎么来的。</p>" }] },
      task: { name: "任务看板文档", file: "TASK_BOARD.md", intro: "项目任务池、优先级、状态和本周重点的基础文档。", meta: ["任务池", "优先级", "负责人"], summary: [{ label: "主线任务", value: "T-001" }, { label: "待推进重点", value: "权限整改 / 测试收口" }, { label: "新增任务", value: "T-011" }], sections: [{ title: "摘要", html: "<p>集中管理任务池、优先级和本周重点事项。</p>" }] },
      delivery: { name: "项目交付计划", file: "DELIVERY_PLAN.md", intro: "定义阶段划分、进入条件、退出条件和各阶段交付物。", meta: ["阶段计划", "退出条件", "交付物"], summary: [{ label: "当前阶段", value: "D1 业务实现" }, { label: "下一阶段", value: "D2 质量整改" }, { label: "交付目标", value: "可验证、可上线、可交接" }], sections: [{ title: "摘要", html: "<p>用于约束项目阶段，不允许把“功能完成”误判为“可交付”。</p>" }] },
      risk: { name: "项目风险台账", file: "RISK_REGISTER.md", intro: "记录当前高风险点、缓解动作和风险关闭规则。", meta: ["风险分级", "缓解动作", "关闭规则"], summary: [{ label: "R1 风险", value: "4" }, { label: "前三风险", value: "权限 / 数据范围 / 测试矩阵" }, { label: "风险原则", value: "无验证不关闭" }], sections: [{ title: "摘要", html: "<p>用于项目负责人持续盯住真正影响交付和上线可信度的事项。</p>" }] },
      test: { name: "测试策略", file: "TEST_STRATEGY.md", intro: "定义测试目标、测试层级、执行方式和交付前验证逻辑。", meta: ["测试目标", "角色矩阵", "回归策略"], summary: [{ label: "核心目标", value: "流程可用 + 权限可信 + 结果可信" }, { label: "当前缺口", value: "系统化测试计划不足" }, { label: "后续建议", value: "补 UAT 和执行记录" }], sections: [{ title: "摘要", html: "<p>不是为了“多跑命令”，而是为了回答系统到底能不能可信交付。</p>" }] },
      release: { name: "发布准备清单", file: "RELEASE_CHECKLIST.md", intro: "上线前的最终检查入口，覆盖代码、环境、脚本、测试、交接和风险确认。", meta: ["发布前检查", "环境确认", "交付包"], summary: [{ label: "检查目标", value: "避免临场拼凑上线" }, { label: "关键要求", value: "P0 清零或书面豁免" }, { label: "交付包", value: "代码、说明、脚本、结果" }], sections: [{ title: "摘要", html: "<p>用于上线前逐项确认，不允许靠经验和口头判断放行。</p>" }] },
      sprint: { name: "测试上线冲刺清单", file: "PM_TEST_RELEASE_SPRINT_CHECKLIST_2026-05-14.md", intro: "面向项目负责人，用来驱动本轮测试收口和上线推进的核心执行文档。", meta: ["执行基线", "冲刺计划", "上线收口"], summary: [{ label: "适用阶段", value: "功能成型到测试上线前" }, { label: "核心目标", value: "交付驱动" }, { label: "时间分层", value: "3 天 / 1 周 / 收口 / 上线前" }], sections: [{ title: "摘要", html: "<p>当前最重要的项目负责人执行基线，决定测试和上线推进节奏。</p>" }] },
      review: { name: "代码审查报告", file: "CODE_REVIEW_REPORT_2026-05-14.md", intro: "指出当前代码离“可上线、可审计、可长期维护”还有哪些差距。", meta: ["审查结论", "交付阻断", "整改优先级"], summary: [{ label: "总体判断", value: "能演示，未可上线" }, { label: "最严重问题", value: "权限边界失真" }, { label: "整改阶段", value: "先堵漏洞，再补闭环，再补工程可靠性" }], sections: [{ title: "摘要", html: "<p>当前最严重的问题不在页面细节，而在服务端安全边界失真和业务结果闭环不可信。</p>" }] }
    };

    const navOrder = ["handoff", "dashboard", "progress", "bug", "requirement", "task", "delivery", "risk", "test", "release", "sprint", "review"];
    const params = new URLSearchParams(location.search);
    const currentKey = docs[params.get("doc")] ? params.get("doc") : "dashboard";
    const current = docs[currentKey];

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function parseInline(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      return html;
    }

    function markdownToHtml(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let inUl = false;
      let inOl = false;
      let inCode = false;
      let code = [];
      let para = [];
      let inQuote = false;
      let quote = [];

      function flushPara() {
        if (para.length) {
          html += `<p>${parseInline(para.join(" "))}</p>`;
          para = [];
        }
      }
      function flushList() {
        if (inUl) { html += "</ul>"; inUl = false; }
        if (inOl) { html += "</ol>"; inOl = false; }
      }
      function flushCode() {
        if (inCode) {
          html += `<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`;
          code = [];
          inCode = false;
        }
      }
      function flushQuote() {
        if (inQuote) {
          html += `<blockquote>${quote.map(q => `<p>${parseInline(q)}</p>`).join("")}</blockquote>`;
          quote = [];
          inQuote = false;
        }
      }

      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          flushPara(); flushList(); flushQuote();
          if (inCode) flushCode(); else inCode = true;
          continue;
        }
        if (inCode) { code.push(line); continue; }
        if (!line.trim()) { flushPara(); flushList(); flushQuote(); continue; }
        if (line.startsWith("> ")) {
          flushPara(); flushList();
          inQuote = true;
          quote.push(line.replace(/^>\s?/, ""));
          continue;
        } else {
          flushQuote();
        }
        if (/^###\s+/.test(line)) { flushPara(); flushList(); html += `<h3>${parseInline(line.replace(/^###\s+/, ""))}</h3>`; continue; }
        if (/^##\s+/.test(line)) { flushPara(); flushList(); html += `<h2>${parseInline(line.replace(/^##\s+/, ""))}</h2>`; continue; }
        if (/^#\s+/.test(line)) { flushPara(); flushList(); html += `<h1>${parseInline(line.replace(/^#\s+/, ""))}</h1>`; continue; }
        if (/^\d+\.\s+/.test(line)) {
          flushPara();
          if (inUl) flushList();
          if (!inOl) { html += "<ol>"; inOl = true; }
          html += `<li>${parseInline(line.replace(/^\d+\.\s+/, ""))}</li>`;
          continue;
        }
        if (/^-\s+/.test(line)) {
          flushPara();
          if (inOl) flushList();
          if (!inUl) { html += "<ul>"; inUl = true; }
          html += `<li>${parseInline(line.replace(/^-\s+/, ""))}</li>`;
          continue;
        }
        para.push(line.trim());
      }
      flushPara(); flushList(); flushQuote(); flushCode();
      return html;
    }

    function renderFallback() {
      document.getElementById("docContent").innerHTML = `
        <div class="callout"><p>当前浏览器环境未能直接读取本地 Markdown 文件，已自动切换为结构化摘要视图。你仍然可以使用“打开原文”查看原始文档。</p></div>
        <div style="height:16px;"></div>
        ${current.sections.map(section => `<div class="section-block"><h3>${section.title}</h3>${section.html}</div>`).join("")}
      `;
    }

    async function renderDoc() {
      document.title = `${current.name} - 项目文档查看器`;
      document.getElementById("docTitle").textContent = current.name;
      document.getElementById("docIntro").textContent = current.intro;
      document.getElementById("rawDocLink").href = `./${current.file}`;
      document.getElementById("docMeta").innerHTML = current.meta.map((item, index) => `<span class="pill ${index === 0 ? "brand" : index === 1 ? "warn" : "ok"}">${item}</span>`).join("");
      document.getElementById("docNav").innerHTML = navOrder.map(key => {
        const doc = docs[key];
        return `<a class="doc-link ${key === currentKey ? "active" : ""}" href="./project-doc-viewer.html?doc=${key}"><strong>${doc.name}</strong><span>${doc.intro}</span></a>`;
      }).join("");
      document.getElementById("summaryGrid").innerHTML = current.summary.map(item => `<div class="summary-card"><span>${item.label}</span><strong>${item.value}</strong></div>`).join("");

      try {
        const response = await fetch(`./${current.file}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const markdown = await response.text();
        document.getElementById("docContent").innerHTML = `
          <div class="callout"><p>已自动读取本地 Markdown 原文，并转换为设计化阅读视图。若你发现内容与原文显示存在偏差，可点击“打开原文”核对。</p></div>
          <div style="height:16px;"></div>
          <div class="section-block markdown-body">${markdownToHtml(markdown)}</div>
        `;
      } catch (error) {
        renderFallback();
      }
    }

    renderDoc();
  </script>
</body>
</html>
